name: MLOps Validation and Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install linter
        run: pip install flake8

      - name: Run linter
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  train:
    needs: linter
    if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[run-train]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dvc pandas scikit-learn mlflow

      - name: Pull data with DVC
        env: 
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user $DAGSHUB_USERNAME
          dvc remote modify origin --local password $DAGSHUB_TOKEN
          
          dvc pull
          
      - name: Train model and log to MLflow
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          python train.py 2>&1 | tee train_output.log

      - name: Export Run ID Artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-run-info
          path: model_info.txt

      - name: Create Error Log on Failure
        if: failure()
        run: |
          echo "Training job failed at $(date)" > error_logs.txt
          if [ -f train_output.log ]; then
            cat train_output.log >> error_logs.txt
          else
            echo "No training output log found." >> error_logs.txt
          fi

      - name: Upload Error Logs Artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      - name: Cleanup
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."

  deploy:
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install mlflow

      - name: Download Run ID Artifact
        uses: actions/download-artifact@v4
        with:
          name: model-run-info

      - name: Check MLflow Accuracy Threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: python check_threshold.py

      - name: Containerize (Mock Build)
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"
          docker build --build-arg RUN_ID=$(cat model_info.txt) -t iris-deployment-mock .
